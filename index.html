<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Presentation Coach — Voice Analysis</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#080e1a;color:#e2e8f0;font-family:system-ui,'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;}
button{cursor:pointer;border:none;font-family:inherit;}

/* Layout */
.layout{display:grid;grid-template-columns:300px 1fr;flex:1;overflow:hidden;}
.sidebar{background:#0c1526;border-right:1px solid rgba(255,255,255,0.06);padding:20px 16px;overflow-y:auto;display:flex;flex-direction:column;gap:14px;}
.main{display:flex;flex-direction:column;overflow:hidden;}

/* Cards */
.card{background:#0f1f35;border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:14px 16px;}
.card-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#475569;margin-bottom:12px;}

/* Mic button */
.mic-btn{width:100%;padding:10px;border-radius:10px;font-size:13px;font-weight:700;letter-spacing:.02em;transition:all .2s;}
.mic-btn.off{background:#1e3a5f;color:#60a5fa;}
.mic-btn.off:hover{background:#1e4a7f;}
.mic-btn.on{background:#7f1d1d;color:#fca5a5;}
.mic-btn.on:hover{background:#991b1b;}
.mic-status{display:flex;align-items:center;gap:7px;margin-top:10px;font-size:11px;color:#475569;}
.dot{width:7px;height:7px;border-radius:50%;background:#334155;flex-shrink:0;transition:background .3s;}
.dot.active{background:#4ade80;}
.dot.speaking{background:#4ade80;box-shadow:0 0 6px #4ade80;}

/* Metric bars */
.metric-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.metric-row:last-child{margin-bottom:0;}
.metric-label{font-size:11px;color:#64748b;width:82px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.metric-track{flex:1;height:5px;border-radius:3px;background:#1a2740;position:relative;overflow:visible;}
.metric-zone{position:absolute;top:0;height:100%;border-radius:3px;background:#22c55e;opacity:.22;pointer-events:none;}
.metric-fill{height:100%;border-radius:3px;transition:width .12s ease-out;position:relative;z-index:1;}
.metric-val{font-size:10px;color:#334155;width:24px;text-align:right;flex-shrink:0;}

/* Vinh ring */
.vinh-header{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
.ring-wrap{position:relative;width:72px;height:72px;flex-shrink:0;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;}
.ring-pct{font-size:16px;font-weight:800;line-height:1;}
.ring-sub{font-size:9px;color:#475569;line-height:1;}
.vinh-meta{flex:1;min-width:0;}
.vinh-name{font-size:14px;font-weight:700;color:#e2e8f0;}
.vinh-sub{font-size:10px;color:#475569;margin-top:1px;}

/* Foundation rows */
.found-row{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.found-row:last-child{border-bottom:none;}
.found-icon{font-size:16px;line-height:1;padding-top:1px;width:20px;flex-shrink:0;}
.found-body{flex:1;min-width:0;}
.found-top{display:flex;justify-content:space-between;align-items:center;gap:4px;}
.found-name{font-size:11px;font-weight:600;color:#cbd5e1;}
.found-status{font-size:10px;font-weight:700;flex-shrink:0;}
.found-desc{font-size:9px;color:#334155;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* Coaching tip */
.tip-box{background:rgba(120,80,0,.22);border:1px solid rgba(200,140,0,.25);border-radius:8px;padding:9px 11px;margin-top:10px;}
.tip-box p{font-size:11px;color:#fcd34d;line-height:1.5;}
.tip-box strong{font-weight:700;}

/* Main area — waveform + big metrics */
.main-body{flex:1;display:flex;flex-direction:column;padding:20px;gap:16px;overflow-y:auto;}

/* Waveform */
.waveform-wrap{position:relative;}
canvas.waveform{width:100%;height:80px;border-radius:10px;background:#0c1526;border:1px solid rgba(255,255,255,0.05);display:block;}
.waveform-label{position:absolute;top:8px;left:12px;font-size:10px;color:#334155;letter-spacing:.08em;text-transform:uppercase;}

/* Big metric cards */
.big-metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
.big-card{background:#0c1526;border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:14px 12px;display:flex;flex-direction:column;gap:6px;position:relative;overflow:hidden;}
.big-card-bg{position:absolute;bottom:-18px;right:-10px;font-size:54px;opacity:.04;pointer-events:none;line-height:1;}
.big-card-label{font-size:10px;color:#475569;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
.big-card-val{font-size:28px;font-weight:800;line-height:1;letter-spacing:-1px;}
.big-card-sub{font-size:10px;color:#334155;}
.big-card-bar{height:4px;border-radius:2px;background:#1a2740;position:relative;overflow:visible;}
.big-card-bar-fill{height:100%;border-radius:2px;transition:width .15s ease-out;}
.big-card-zone{position:absolute;top:0;height:100%;border-radius:2px;background:#22c55e;opacity:.25;}
.big-card-status{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;}

/* MY norms */
.norms-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
.norm-card{background:#0c1526;border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:12px 10px;}
.norm-icon{font-size:18px;margin-bottom:5px;}
.norm-label{font-size:9px;color:#475569;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:6px;}
.norm-bar-wrap{height:3px;background:#1a2740;border-radius:2px;overflow:hidden;}
.norm-bar-fill{height:100%;border-radius:2px;transition:width .15s ease-out;}
.norm-val{font-size:11px;font-weight:700;margin-top:4px;}

/* Status strip */
.status-strip{display:flex;align-items:center;gap:14px;padding:8px 20px;border-bottom:1px solid rgba(255,255,255,0.05);background:#090f1c;font-size:11px;flex-shrink:0;flex-wrap:wrap;}
.status-item{display:flex;align-items:center;gap:5px;color:#475569;}
.status-val{color:#e2e8f0;font-weight:700;}
.status-sep{color:#1e2d45;}
.live-tip{margin-left:auto;font-size:10px;color:#fbbf24;font-weight:500;max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

@media(max-width:900px){
  .layout{grid-template-columns:1fr;}
  .sidebar{border-right:none;border-bottom:1px solid rgba(255,255,255,0.06);}
  .big-metrics,.norms-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ─── Vinh Giang Benchmarks ────────────────────────────────────────────────────
const VINH = {
  volume:     { min:.42, ideal:.58, max:.78, label:'6–7/10 projection' },
  speechRate: { min:.28, ideal:.40, max:.55, label:'130–145 WPM' },
  pitch:      { min:.28, ideal:.45, max:.70, label:'Wide range' },
  tonality:   { min:.40, ideal:.62, max:1.0, label:'Expressive & melodic' },
  pause:      { min:.00, ideal:.18, max:.38, label:'1–3s strategic pauses' },
};
const FOUNDATIONS = [
  { key:'volume',     icon:'📢', name:'Volume',     vinh:'Target 6–7/10. Project like you believe it.' },
  { key:'speechRate', icon:'⏱',  name:'Rate',       vinh:'130–145 WPM. Slow to ~90 for key points.' },
  { key:'pitch',      icon:'🎵', name:'Pitch',      vinh:'Use all the keys — siren glide daily.' },
  { key:'tonality',   icon:'❤️', name:'Tonality',   vinh:'Emotion lives beneath the words.' },
  { key:'pause',      icon:'🤫', name:'The Pause',  vinh:'1–3s silence beats any filler word.' },
];
const TIPS = {
  volume:     { low:'Project more — imagine speaking to someone 5 metres away.', high:'Ease back slightly on volume.', ok:'Volume is solid. Keep that projection.' },
  speechRate: { low:'Pick up pace a touch — Vinh targets ~130–145 WPM.', high:'Slow down — let each idea land before moving on.', ok:'Great pace. Vary it: slow for impact, faster for excitement.' },
  pitch:      { low:'Open your pitch range — try the siren drill: hum from your lowest to highest note and back.', high:'Bring your pitch centre lower for more authority.', ok:'Nice pitch range. Keep exploring all the notes.' },
  tonality:   { low:'Add emotion — Vinh says tonality is the feeling beneath the words. Smile while you speak, it changes your voice.', high:'Dial back the intensity slightly.', ok:'Tonality is working. Your conviction is coming through.' },
  pause:      { low:'Use silence as a tool — replace every "uh/um" with a 1–3s pause instead.', high:'Pauses running long — the audience disengages after about 3 seconds.', ok:'Pausing well. That silence is letting your ideas breathe.' },
};

function distScore(v, t) {
  if (v >= t.min && v <= t.max) return Math.abs(v - t.ideal) / Math.max(t.ideal - t.min, t.max - t.ideal, .01);
  if (v < t.min) return Math.min(1, (t.min - v) / Math.max(t.min, .01));
  return Math.min(1, (v - t.max) / Math.max(1 - t.max, .01));
}
function getDev(v, t, lo, hi) {
  const dist = distScore(v, t);
  const dir  = v < t.min ? 'low' : v > t.max ? 'high' : 'ok';
  return { dist, dir, label: dir === 'low' ? lo : dir === 'high' ? hi : '✓ on target' };
}
function computeVinhScore(metrics) {
  const { volume, speechRate, pitch, tonality, pauseDuration, isSpeaking } = metrics;
  if (!isSpeaking && pauseDuration < .05) return null;
  const dims = {
    volume:     getDev(volume,       VINH.volume,     'too soft',     'too loud'),
    speechRate: getDev(speechRate,   VINH.speechRate, 'too slow',     'too fast'),
    pitch:      getDev(pitch,        VINH.pitch,      'too monotone', 'too high'),
    tonality:   getDev(tonality,     VINH.tonality,   'flat delivery','over-expressive'),
    pause:      getDev(pauseDuration,VINH.pause,      'no pauses',    'too much silence'),
  };
  const weighted = dims.volume.dist*.20 + dims.speechRate.dist*.20 + dims.pitch.dist*.15 + dims.tonality.dist*.30 + dims.pause.dist*.15;
  const matchPct  = Math.max(0, Math.round((1 - weighted) * 100));
  const worstKey  = Object.entries(dims).sort((a,b) => b[1].dist - a[1].dist)[0];
  const tip       = TIPS[worstKey[0]]?.[worstKey[1].dir] ?? 'Keep speaking.';
  return { matchPct, dims, tip };
}

// ─── Audio Analyser ───────────────────────────────────────────────────────────
const ENTER_RMS=.038, EXIT_RMS=.016, MIN_GAP=120, MIN_DUR=55;
const VB_MIN_HZ=85, VB_MAX_HZ=3200, VB_RATIO=.30;

function useAudioAnalyzer(enabled) {
  const [metrics, setMetrics] = useState({
    volume:0, speechRate:0, pitch:0, tonality:0, pauseDuration:0, isSpeaking:false,
    waveform: new Float32Array(128),
    malaysianScore:{ tooSoft:0, fillerRhythm:0, tooFast:0, monotone:0, longPause:0, overall:0 },
  });
  const [error,  setError]  = useState(null);
  const [active, setActive] = useState(false);
  const refs = useRef({ ctx:null, analyser:null, stream:null, raf:null });
  const st   = useRef({
    speaking:false, speechStart:null, lastOnset:-Infinity, pendingOnset:null,
    volumes:[], pitchHistory:[], speechOnsets:[], silenceStart:null,
  });

  const stop = useCallback(() => {
    const r = refs.current;
    if (r.raf) cancelAnimationFrame(r.raf);
    if (r.stream) r.stream.getTracks().forEach(t => t.stop());
    if (r.ctx) r.ctx.close();
    r.ctx = r.analyser = r.stream = null;
    setActive(false);
    setMetrics(p => ({ ...p, volume:0, isSpeaking:false, speechRate:0, waveform: new Float32Array(128) }));
  }, []);

  useEffect(() => {
    if (!enabled) { stop(); return; }
    (async () => {
      try {
        const stream   = await navigator.mediaDevices.getUserMedia({ audio:true, video:false });
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const analyser = audioCtx.createAnalyser();
        analyser.fftSize = 2048;
        analyser.smoothingTimeConstant = .5;
        audioCtx.createMediaStreamSource(stream).connect(analyser);
        refs.current = { ...refs.current, ctx:audioCtx, analyser, stream };
        setActive(true); setError(null);
      } catch(e) { setError(e.message || 'Microphone access denied'); }
    })();
    return stop;
  }, [enabled]);

  useEffect(() => {
    if (!active || !refs.current.analyser) return;
    const analyser = refs.current.analyser;
    const fftSize  = analyser.fftSize, binCount = analyser.frequencyBinCount;
    const tdBuf    = new Float32Array(fftSize);
    const fBuf     = new Float32Array(binCount);
    const waveBuf  = new Float32Array(128);
    const s        = st.current;
    let lastT      = performance.now();
    const WINDOW   = 4000;

    function tick() {
      refs.current.raf = requestAnimationFrame(tick);
      const now = performance.now();
      if (now - lastT < 16) return;
      lastT = now;

      analyser.getFloatTimeDomainData(tdBuf);
      analyser.getFloatFrequencyData(fBuf);

      // Downsampled waveform for visualisation
      const step = Math.floor(fftSize / 128);
      for (let i = 0; i < 128; i++) waveBuf[i] = tdBuf[i * step];

      // RMS
      let sum = 0;
      for (const v of tdBuf) sum += v * v;
      const rms  = Math.sqrt(sum / fftSize);
      const vol  = Math.min(1, rms * 7);

      // Voice-band ratio
      const SR     = refs.current.ctx?.sampleRate || 44100;
      const hpb    = SR / fftSize;
      const vMinB  = Math.floor(VB_MIN_HZ / hpb);
      const vMaxB  = Math.ceil(VB_MAX_HZ  / hpb);
      let tot=0, vp=0;
      for (let i=1; i<binCount; i++) {
        const pw = Math.pow(10, fBuf[i]/10);
        tot += pw;
        if (i >= vMinB && i <= vMaxB) vp += pw;
      }
      const isVoice = tot > 0 && (vp/tot) >= VB_RATIO;

      // Hysteresis VAD
      const prev = s.speaking;
      if (!s.speaking && rms > ENTER_RMS && isVoice) { s.speaking=true;  s.speechStart=now; }
      else if (s.speaking && rms < EXIT_RMS)          { s.speaking=false; s.speechStart=null; }
      const speaking = s.speaking;

      // Onset detection
      if (!prev && speaking) s.pendingOnset = now;
      if (s.pendingOnset && speaking && (now - s.pendingOnset) >= MIN_DUR) {
        if ((s.pendingOnset - s.lastOnset) >= MIN_GAP) {
          s.speechOnsets.push(s.pendingOnset);
          s.lastOnset = s.pendingOnset;
        }
        s.pendingOnset = null;
      }
      if (!speaking) s.pendingOnset = null;

      // Pause tracking
      if (!speaking) { if (!s.silenceStart) s.silenceStart = now; }
      else           { if (s.silenceStart)  { s.silenceStart = null; } }

      // Pitch
      let pitch = 0;
      if (speaking && isVoice) {
        const MAX = Math.floor(fftSize / 2);
        let best=0, bestP=-1;
        for (let o=80; o<MAX; o++) {
          let c=0;
          for (let i=0; i<MAX; i++) c += tdBuf[i]*tdBuf[i+o];
          if (c > best) { best=c; bestP=o; }
        }
        if (bestP>0 && best>.015) pitch = SR/bestP;
      }
      if (pitch>0) s.pitchHistory.push({ time:now, pitch });

      // Prune
      const cut = now - WINDOW;
      s.pitchHistory  = s.pitchHistory.filter(p => p.time > cut);
      s.speechOnsets  = s.speechOnsets.filter(t => t > cut);
      s.volumes = s.volumes || [];
      s.volumes.push({ time:now, v:vol });
      s.volumes = s.volumes.filter(v => v.time > cut);

      // Speech rate
      const speechRate = Math.min(1, (s.speechOnsets.length / (WINDOW/1000)) * .18);

      // Pitch stats
      const avgPitch = s.pitchHistory.length > 0
        ? s.pitchHistory.reduce((a,b) => a+b.pitch, 0) / s.pitchHistory.length : 0;
      let pitchVar = 0;
      if (s.pitchHistory.length > 4) {
        pitchVar = Math.sqrt(s.pitchHistory.reduce((a,b) => a+Math.pow(b.pitch-avgPitch,2),0)/s.pitchHistory.length);
      }
      const tonality     = Math.min(1, pitchVar/80);
      const pauseDuration = s.silenceStart ? Math.min(1,(now-s.silenceStart)/4000) : 0;

      // MY norms
      const avgVol = s.volumes.reduce((a,b)=>a+b.v,0)/Math.max(1,s.volumes.length);
      const tooSoft   = avgVol<.25&&speaking ? Math.min(1,(0.25-avgVol)*5) : 0;
      const tooFast   = speechRate>.75 ? Math.min(1,(speechRate-.75)*3) : 0;
      const monotone  = speaking ? Math.max(0,1-tonality*2.5) : 0;
      const longPause = pauseDuration>.6 ? (pauseDuration-.6)*2.5 : 0;
      const ro = s.speechOnsets.filter(t => t > now-2000);
      let fillerRhythm=0;
      for (let i=1;i<ro.length-1;i++) {
        const g1=ro[i]-ro[i-1], g2=ro[i+1]-ro[i];
        if (g1>80&&g1<350&&g2>80&&g2<350) fillerRhythm+=.25;
      }
      fillerRhythm = Math.min(1, fillerRhythm);
      const overall = Math.min(1, tooSoft*.25+tooFast*.2+monotone*.25+longPause*.2+fillerRhythm*.1);

      setMetrics({
        volume:vol, speechRate, pitch:Math.min(1,avgPitch/300), tonality, pauseDuration, isSpeaking:speaking,
        waveform: waveBuf.slice(),
        malaysianScore:{ tooSoft, fillerRhythm, tooFast, monotone, longPause, overall },
      });
    }
    refs.current.raf = requestAnimationFrame(tick);
    return () => { if (refs.current.raf) cancelAnimationFrame(refs.current.raf); };
  }, [active]);

  return { metrics, error, active };
}

// ─── Waveform Canvas ─────────────────────────────────────────────────────────
function Waveform({ data, active, speaking }) {
  const ref = useRef(null);
  useEffect(() => {
    const c = ref.current;
    if (!c) return;
    const ctx = c.getContext('2d');
    const w = c.width, h = c.height;
    ctx.clearRect(0,0,w,h);
    if (!active) {
      ctx.strokeStyle = '#1a2740';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(0, h/2);
      ctx.lineTo(w, h/2);
      ctx.stroke();
      return;
    }
    const color = speaking ? '#6366f1' : '#1e3a5f';
    const grad = ctx.createLinearGradient(0,0,w,0);
    grad.addColorStop(0, 'transparent');
    grad.addColorStop(.1, color);
    grad.addColorStop(.9, color);
    grad.addColorStop(1, 'transparent');
    ctx.strokeStyle = grad;
    ctx.lineWidth = 2;
    ctx.beginPath();
    const len = data.length;
    for (let i=0; i<len; i++) {
      const x = (i/len)*w;
      const y = h/2 + data[i] * h * 0.45;
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.stroke();
    // Mirror
    ctx.globalAlpha = .25;
    ctx.beginPath();
    for (let i=0; i<len; i++) {
      const x = (i/len)*w;
      const y = h/2 - data[i] * h * 0.45;
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.stroke();
    ctx.globalAlpha = 1;
  }, [data, active, speaking]);

  useEffect(() => {
    const c = ref.current;
    if (!c) return;
    const ro = new ResizeObserver(() => {
      c.width  = c.offsetWidth * devicePixelRatio;
      c.height = c.offsetHeight * devicePixelRatio;
    });
    ro.observe(c);
    return () => ro.disconnect();
  }, []);

  return <canvas ref={ref} className="waveform"/>;
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function statusColor(v, t) {
  if (v >= t.min && v <= t.max) return '#4ade80';
  const dist = v < t.min ? t.min-v : v-t.max;
  return dist > .15 ? '#f87171' : '#fbbf24';
}
function pct(v){ return Math.round(v*100); }

function MetricBar({ label, value, color, target }) {
  const fill = Math.round(value*100);
  return (
    <div className="metric-row">
      <span className="metric-label">{label}</span>
      <div className="metric-track">
        {target && <div className="metric-zone" style={{ left:`${target.min*100}%`, width:`${(target.max-target.min)*100}%` }}/>}
        <div className="metric-fill" style={{ width:`${fill}%`, background:color }}/>
      </div>
      <span className="metric-val">{fill}</span>
    </div>
  );
}

const DIR_COLOR = { ok:'#4ade80', low:'#f59e0b', high:'#f87171' };

function VinhRing({ score }) {
  const pctVal   = score?.matchPct ?? null;
  const ringColor = pctVal===null ? '#1e2d45' : pctVal>=75 ? '#4ade80' : pctVal>=50 ? '#fbbf24' : '#f87171';
  const circ      = 2*Math.PI*28;
  const dash      = pctVal!==null ? (pctVal/100)*circ : 0;
  return (
    <div className="ring-wrap">
      <svg width="72" height="72">
        <circle cx="36" cy="36" r="28" fill="none" stroke="#1a2740" strokeWidth="6"/>
        <circle cx="36" cy="36" r="28" fill="none" stroke={ringColor} strokeWidth="6"
          strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
          style={{ transition:'stroke-dasharray .5s ease, stroke .3s' }}/>
      </svg>
      <div className="ring-label">
        <span className="ring-pct" style={{ color:ringColor }}>{pctVal!==null ? `${pctVal}%` : '—'}</span>
        <span className="ring-sub">match</span>
      </div>
    </div>
  );
}

function BigCard({ icon, label, value, color, target, unit='', statusText }) {
  const fill = Math.round(value*100);
  const sc = target ? statusColor(value, target) : color;
  return (
    <div className="big-card">
      <div className="big-card-bg">{icon}</div>
      <span className="big-card-label">{label}</span>
      <span className="big-card-val" style={{ color:sc }}>{fill}<span style={{ fontSize:14, fontWeight:400, color:'#334155' }}>{unit}</span></span>
      <div className="big-card-bar">
        {target && <div className="big-card-zone" style={{ left:`${target.min*100}%`, width:`${(target.max-target.min)*100}%` }}/>}
        <div className="big-card-bar-fill" style={{ width:`${fill}%`, background:sc }}/>
      </div>
      {statusText && <span className="big-card-status" style={{ color:sc }}>{statusText}</span>}
    </div>
  );
}

function NormCard({ icon, label, value, color }) {
  const fill = Math.round(value*100);
  const c = value > .6 ? '#ef4444' : value > .3 ? '#f59e0b' : '#4ade80';
  return (
    <div className="norm-card">
      <div className="norm-icon">{icon}</div>
      <div className="norm-label">{label}</div>
      <div className="norm-bar-wrap"><div className="norm-bar-fill" style={{ width:`${fill}%`, background:c }}/></div>
      <div className="norm-val" style={{ color:c }}>{fill}%</div>
    </div>
  );
}

function getStatusText(value, target) {
  if (!target) return '';
  if (value < target.min) return '▼ below target';
  if (value > target.max) return '▲ above target';
  return '✓ in range';
}

// ─── App ─────────────────────────────────────────────────────────────────────
function App() {
  const [micEnabled, setMicEnabled] = useState(false);
  const { metrics, error, active }  = useAudioAnalyzer(micEnabled);
  const vinhScore = useMemo(() => computeVinhScore(metrics), [metrics]);
  const { volume, speechRate, pitch, tonality, pauseDuration, isSpeaking, waveform, malaysianScore: ms } = metrics;

  return (
    <div style={{ display:'flex', flexDirection:'column', minHeight:'100vh' }}>

      {/* Status strip */}
      <div className="status-strip">
        <div className="status-item">
          <div className="dot" style={{ background: active ? (isSpeaking?'#4ade80':'#334155') : '#1e2d45' }}/>
          <span>{active ? (isSpeaking ? 'Speaking' : 'Listening') : 'Off'}</span>
        </div>
        <span className="status-sep">|</span>
        <div className="status-item">Vinh match: <span className="status-val" style={{ color: vinhScore ? (vinhScore.matchPct>=75?'#4ade80':vinhScore.matchPct>=50?'#fbbf24':'#f87171') : '#334155' }}>{vinhScore ? `${vinhScore.matchPct}%` : '—'}</span></div>
        <span className="status-sep">|</span>
        <div className="status-item">MY issues: <span className="status-val" style={{ color: ms.overall>.5?'#f87171':ms.overall>.25?'#fbbf24':'#4ade80' }}>{pct(ms.overall)}%</span></div>
        {vinhScore?.tip && <span className="live-tip">💡 {vinhScore.tip}</span>}
      </div>

      <div className="layout" style={{ flex:1 }}>

        {/* Sidebar */}
        <aside className="sidebar">
          <div>
            <div style={{ fontSize:17, fontWeight:800, color:'#e2e8f0', letterSpacing:'-.5px' }}>Presentation Coach</div>
            <div style={{ fontSize:10, color:'#334155', marginTop:3 }}>Voice analysis · Vinh Giang benchmarks</div>
          </div>

          {/* Mic */}
          <div className="card">
            <div className="card-title">Microphone</div>
            <button className={`mic-btn ${micEnabled?'on':'off'}`} onClick={() => setMicEnabled(v=>!v)}>
              {micEnabled ? '⏹  Stop recording' : '🎙  Start recording'}
            </button>
            {error && <p style={{ fontSize:11, color:'#f87171', marginTop:8 }}>{error}</p>}
            <div className="mic-status">
              <div className={`dot ${active ? (isSpeaking?'speaking':'active') : ''}`}/>
              <span>{active ? (isSpeaking ? 'Voice detected' : 'Mic open, waiting…') : 'Click to begin'}</span>
            </div>
          </div>

          {/* Vinh panel */}
          <div className="card">
            <div className="vinh-header">
              <VinhRing score={vinhScore}/>
              <div className="vinh-meta">
                <div className="vinh-name">Vinh Giang</div>
                <div className="vinh-sub">5 Vocal Foundations</div>
              </div>
            </div>
            {FOUNDATIONS.map(f => {
              const dim = vinhScore?.dims?.[f.key];
              return (
                <div key={f.key} className="found-row">
                  <div className="found-icon">{f.icon}</div>
                  <div className="found-body">
                    <div className="found-top">
                      <span className="found-name">{f.name}</span>
                      <span className="found-status" style={{ color: dim ? DIR_COLOR[dim.dir] : '#334155' }}>{dim?.label ?? '—'}</span>
                    </div>
                    <div className="found-desc">{f.vinh}</div>
                  </div>
                </div>
              );
            })}
            {vinhScore?.tip && (
              <div className="tip-box">
                <p><strong>Coach:</strong> {vinhScore.tip}</p>
              </div>
            )}
          </div>

          {/* Your metrics with Vinh zones */}
          <div className="card">
            <div className="card-title">Your metrics <span style={{ color:'#1a3a20', fontWeight:400 }}>🟩 = Vinh zone</span></div>
            <MetricBar label="Volume"      value={volume}        color="#22c55e" target={VINH.volume}/>
            <MetricBar label="Speech Rate" value={speechRate}    color="#6366f1" target={VINH.speechRate}/>
            <MetricBar label="Pitch"       value={pitch}         color="#a78bfa" target={VINH.pitch}/>
            <MetricBar label="Tonality"    value={tonality}      color="#f59e0b" target={VINH.tonality}/>
            <MetricBar label="Pause"       value={pauseDuration} color="#f97316" target={VINH.pause}/>
          </div>
        </aside>

        {/* Main */}
        <main className="main">
          <div className="main-body">

            {/* Waveform */}
            <div className="waveform-wrap card" style={{ padding:0, overflow:'hidden' }}>
              <div style={{ padding:'10px 14px 0', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                <span style={{ fontSize:10, color:'#334155', letterSpacing:'.08em', textTransform:'uppercase', fontWeight:700 }}>Live waveform</span>
                {isSpeaking && <span style={{ fontSize:10, color:'#6366f1', fontWeight:700, letterSpacing:'.05em' }}>● VOICE DETECTED</span>}
              </div>
              <div style={{ padding:'6px 0 0', height:90 }}>
                <Waveform data={waveform} active={active} speaking={isSpeaking}/>
              </div>
            </div>

            {/* Big 5 metric cards */}
            <div>
              <div style={{ fontSize:10, color:'#334155', fontWeight:700, letterSpacing:'.08em', textTransform:'uppercase', marginBottom:8 }}>5 Vocal Foundations</div>
              <div className="big-metrics">
                <BigCard icon="📢" label="Volume"      value={volume}        color="#22c55e" target={VINH.volume}     statusText={active ? getStatusText(volume,VINH.volume) : ''}/>
                <BigCard icon="⏱"  label="Speech Rate" value={speechRate}    color="#6366f1" target={VINH.speechRate} statusText={active ? getStatusText(speechRate,VINH.speechRate) : ''}/>
                <BigCard icon="🎵" label="Pitch"       value={pitch}         color="#a78bfa" target={VINH.pitch}      statusText={active ? getStatusText(pitch,VINH.pitch) : ''}/>
                <BigCard icon="❤️" label="Tonality"    value={tonality}      color="#f59e0b" target={VINH.tonality}   statusText={active ? getStatusText(tonality,VINH.tonality) : ''}/>
                <BigCard icon="🤫" label="The Pause"   value={pauseDuration} color="#f97316" target={VINH.pause}      statusText={active ? getStatusText(pauseDuration,VINH.pause) : ''}/>
              </div>
            </div>

            {/* Malaysian norms */}
            <div>
              <div style={{ fontSize:10, color:'#334155', fontWeight:700, letterSpacing:'.08em', textTransform:'uppercase', marginBottom:8 }}>🇲🇾 Malaysian Delivery Norms</div>
              <div className="norms-grid">
                <NormCard icon="🔇" label="Too Soft"      value={ms.tooSoft}/>
                <NormCard icon="🗣" label="Filler Rhythm" value={ms.fillerRhythm}/>
                <NormCard icon="⚡" label="Too Fast"      value={ms.tooFast}/>
                <NormCard icon="😐" label="Monotone"      value={ms.monotone}/>
                <NormCard icon="⏸" label="Long Pause"    value={ms.longPause}/>
              </div>
            </div>

            {/* Vinh's method explainer */}
            <div className="card" style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16 }}>
              <div>
                <div className="card-title" style={{ marginBottom:8 }}>Vinh's method</div>
                <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
                  {FOUNDATIONS.map(f => (
                    <div key={f.key} style={{ display:'flex', gap:8, alignItems:'flex-start' }}>
                      <span style={{ fontSize:14 }}>{f.icon}</span>
                      <div>
                        <div style={{ fontSize:11, fontWeight:700, color:'#94a3b8' }}>{f.name} <span style={{ fontWeight:400, color:'#334155' }}>— {VINH[f.key].label}</span></div>
                        <div style={{ fontSize:10, color:'#2d3f58', lineHeight:1.4 }}>{f.vinh}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
              <div>
                <div className="card-title" style={{ marginBottom:8 }}>How to read the bars</div>
                <div style={{ display:'flex', flexDirection:'column', gap:8, fontSize:11, color:'#475569', lineHeight:1.5 }}>
                  <p><span style={{ color:'#4ade80', fontWeight:700 }}>Green zone</span> on each bar = Vinh's target range. Keep your bar inside it.</p>
                  <p><span style={{ color:'#6366f1', fontWeight:700 }}>Speech rate</span> only counts genuine voice onsets — background noise is filtered out.</p>
                  <p><span style={{ color:'#f59e0b', fontWeight:700 }}>Tonality</span> measures pitch variation. Flat = 0, wide expressive range = 100.</p>
                  <p><span style={{ color:'#f97316', fontWeight:700 }}>Pause</span> rises during silence. A 1–3s pause is ideal. Over 3s is too long.</p>
                  <p><span style={{ color:'#fcd34d', fontWeight:700 }}>Match %</span> is a weighted score: Tonality (30%), Volume+Rate (20% each), Pitch+Pause (15% each).</p>
                </div>
              </div>
            </div>

          </div>
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
